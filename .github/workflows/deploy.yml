name: Deploy marketing site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: marketing-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm astro check

      - name: Build
        run: pnpm build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          rsync -az --delete \
            --exclude '.htaccess' \
            --exclude '.well-known/' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=accept-new" \
            dist/ \
            "$SSH_USERNAME@$SSH_HOST:domains/banuacoder.com/public_html/"

      - name: Smoke test
        run: |
          for path in / /en/ /portfolio/ /founder/ /contact/; do
            code=$(curl -sL -o /dev/null -w '%{http_code}' "https://banuacoder.com$path")
            echo "  $code  https://banuacoder.com$path"
            if [ "$code" != "200" ]; then
              echo "::error::Non-200 response for $path"
              exit 1
            fi
          done

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
