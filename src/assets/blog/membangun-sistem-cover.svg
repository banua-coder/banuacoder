    <circle cx="20" cy="20" r="1" fill="#1D9CD4" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Accent stripe -->
  <rect x="0" y="0" width="6" height="630" fill="#12398C"/>
